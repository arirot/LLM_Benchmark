name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check streamlit_app/

      - name: Check imports resolve
        run: |
          cd streamlit_app
          python -c "from data.benchmark_data import LEADERBOARD; print('benchmark_data OK')"
          python -c "from data.vulnerabilities import VULNERABILITIES; print('vulnerabilities OK')"
          python -c "from utils.scoring import composite_score; print('scoring OK')"
          python -c "from utils.parser import parse_findings; print('parser OK')"
